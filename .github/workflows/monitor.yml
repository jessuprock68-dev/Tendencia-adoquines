name: Monitor Trimestral Estrublock

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 12 6,9,12,3 *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4 # Actualizado a v4

      - name: Configurar Python
        uses: actions/setup-python@v5 # Actualizado a v5
        with:
          python-version: '3.10'

      - name: Instalar librerias
        run: pip install -r requirements.txt

      - name: Correr script de tendencias
        run: python adoquin_tendencias1.py

      - name: Guardar el Excel generado
        uses: actions/upload-artifact@v4 # Actualizado a v4
        with:
          name: Reporte-Final-Estrublock
          path: "*.xlsx"
