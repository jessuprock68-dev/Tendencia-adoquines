name: Monitor Trimestral Estrublock

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 12 6,9,12,3 *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar codigo
        uses: actions/checkout@v4

      - name: 2. Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Instalacion de librerias
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl pytrends urllib3==1.26.15

      - name: 4. Ejecutar Analisis
        run: |
          SCRIPT=$(find . -name "adoquin*.py" | head -n 1)
          python "$SCRIPT"

      - name: 5. Exportar Reporte
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Reporte-Estrategico-Estrublock
          path: "*.xlsx"
