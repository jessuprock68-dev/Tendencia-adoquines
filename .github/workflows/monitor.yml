name: Monitor Trimestral Estrublock

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 12 6,9,12,3 *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar codigo del repo
        uses: actions/checkout@v4

      - name: 2. Configurar entorno Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Instalacion Forzada de Herramientas
        # Aquí instalamos directamente para evitar el error de "Module Not Found"
        run: |
          python -m pip install --upgrade pip
          pip install pandas pytrends openpyxl

      - name: 4. Ejecutar Analisis de Mercado
        # Asegúrate de que el nombre del archivo sea exacto
        run: python adoquin_tendencias1.py

      - name: 5. Exportar Reporte Excel
        uses: actions/upload-artifact@v4
        with:
          name: Reporte-Estrategico-Estrublock
          path: "*.xlsx"
