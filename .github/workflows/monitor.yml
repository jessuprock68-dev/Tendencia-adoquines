name: Monitor Trimestral Estrublock

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 12 6,9,12,3 *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar codigo del repo
        uses: actions/checkout@v4

      - name: 2. Configurar entorno Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Instalacion Forzada de Herramientas
        run: |
          python -m pip install --upgrade pip
          pip install pandas pytrends openpyxl

      - name: 4. Ejecutar Analisis (Busqueda Automatica)
        # Este comando busca cualquier archivo que empiece con 'adoquin' y lo corre
        # Soluciona el error de "file not found" por nombres mal escritos
        run: |
          SCRIPT_NAME=$(find . -maxdepth 1 -name "adoquin*.py" -print -quit)
          echo "Ejecutando: $SCRIPT_NAME"
          python "$SCRIPT_NAME"

      - name: 5. Exportar Reporte Excel
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Reporte-Estrategico-Estrublock
          path: "*.xlsx"
