name: Monitor Trimestral Estrublock

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 12 6,9,12,3 *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run script
        run: python adoquin_tendencias1.py
      - name: Upload result
        uses: actions/upload-artifact@v3
        with:
          name: Reporte-Final
          path: "*.xlsx"
